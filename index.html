<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電流と抵抗 学習クイズ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;
      background:#edf2f7;color:#1a202c;min-height:100vh;
    }

    /* ===== ヘッダー ===== */
    header{
      background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 100%);
      color:#fff;padding:14px 18px 12px;text-align:center;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
    }
    .hdr-school{font-size:11px;opacity:.75;margin-bottom:4px;letter-spacing:.5px;}
    .hdr-title{font-size:19px;font-weight:700;letter-spacing:.5px;}
    .hdr-sub{font-size:12px;opacity:.8;margin-top:4px;min-height:1em;}

    /* ===== セクションタブ ===== */
    .tabs{
      display:flex;background:#1e3a8a;
      overflow-x:auto;-webkit-overflow-scrolling:touch;
    }
    .tab{
      flex:1;min-width:60px;padding:10px 4px;text-align:center;
      font-size:13px;font-weight:600;color:rgba(255,255,255,.5);
      cursor:pointer;border-bottom:3px solid transparent;
      transition:all .2s;user-select:none;white-space:nowrap;
    }
    .tab.active{color:#fbbf24;border-bottom-color:#fbbf24;}
    .tab.disabled{opacity:.3;cursor:not-allowed;}

    /* ===== メイン ===== */
    .main{max-width:600px;margin:0 auto;padding:14px 13px 70px;}

    /* ===== モード切替 ===== */
    .mode-row{
      display:flex;background:#fff;border-radius:10px;
      overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:14px;
    }
    .mode-btn{
      flex:1;padding:11px 8px;border:none;background:#fff;
      color:#6b7280;font-size:14px;font-weight:500;
      cursor:pointer;font-family:inherit;transition:all .2s;
    }
    .mode-btn.active{background:#2563eb;color:#fff;}

    /* ===== 自習モード ===== */
    .prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .prog-bar{flex:1;height:5px;background:#cbd5e1;border-radius:3px;}
    .prog-fill{height:100%;background:#2563eb;border-radius:3px;transition:width .35s ease;}
    .prog-text{font-size:12px;color:#64748b;white-space:nowrap;}
    .score-row{text-align:right;font-size:13px;color:#64748b;margin-bottom:12px;}

    .q-card{
      background:#fff;border-radius:12px;padding:18px 20px;
      margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.09);
      border-left:4px solid #2563eb;
    }
    .q-num{font-size:11px;font-weight:700;color:#2563eb;margin-bottom:7px;letter-spacing:.5px;}
    .q-img{display:block;max-width:33%;height:auto;border-radius:8px;margin-bottom:12px;border:1px solid #e2e8f0;}
    .q-text{font-size:15px;line-height:1.75;}

    .choices{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
    .choice-btn{
      width:100%;padding:12px 16px;background:#fff;
      border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;
      font-size:14px;text-align:left;color:#374151;
      transition:all .15s;font-family:inherit;line-height:1.6;
    }
    .choice-btn:hover:not(:disabled){border-color:#93c5fd;background:#eff6ff;}
    .choice-btn.correct{border-color:#34d399;background:#ecfdf5;color:#065f46;font-weight:600;}
    .choice-btn.wrong{border-color:#f87171;background:#fef2f2;color:#991b1b;}
    .choice-btn:disabled{cursor:default;}

    .feedback{
      padding:12px 16px;border-radius:8px;font-size:13px;
      line-height:1.65;display:none;margin-bottom:12px;
    }
    .feedback.ok{display:block;background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;}
    .feedback.ng{display:block;background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;}
    .fb-expl{display:inline-block;margin-top:6px;font-weight:400;color:#78350f;}

    .next-btn{
      width:100%;padding:13px;background:#2563eb;color:#fff;
      border:none;border-radius:8px;font-size:15px;font-weight:600;
      cursor:pointer;font-family:inherit;transition:background .2s;
    }
    .next-btn:hover{background:#1e3a8a;}

    /* ===== 結果画面 ===== */
    .result-card{
      background:#fff;border-radius:16px;padding:40px 24px;
      text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1);
    }
    .result-emoji{font-size:56px;margin-bottom:14px;}
    .result-score{font-size:56px;font-weight:800;color:#2563eb;line-height:1;}
    .result-total{font-size:17px;color:#64748b;margin-bottom:6px;}
    .result-pct{font-size:28px;font-weight:700;color:#374151;margin-bottom:28px;}
    .retry-btn{
      padding:12px 36px;background:#2563eb;color:#fff;border:none;
      border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;
    }
    .retry-btn:hover{background:#1e3a8a;}

    /* ===== 送信モード ===== */
    .name-card{
      background:#fff;border-radius:12px;padding:16px 20px;
      margin-bottom:13px;box-shadow:0 1px 4px rgba(0,0,0,.08);
    }
    .name-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:8px;display:block;}
    .name-input{
      width:100%;padding:10px 14px;border:2px solid #e2e8f0;
      border-radius:8px;font-size:15px;font-family:inherit;
      outline:none;color:#1a202c;transition:border-color .2s;
    }
    .name-input:focus{border-color:#2563eb;}

    .sub-q{
      background:#fff;border-radius:10px;padding:14px 16px;
      margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);
    }
    .sub-q-num{font-size:11px;font-weight:700;color:#2563eb;margin-bottom:5px;}
    .sub-q-text{font-size:14px;line-height:1.65;margin-bottom:10px;}
    .radio-group{display:flex;flex-direction:column;gap:5px;}
    .radio-label{
      display:flex;align-items:flex-start;gap:10px;
      padding:7px 12px;border:1px solid #e5e7eb;border-radius:6px;
      cursor:pointer;font-size:13px;color:#374151;
      line-height:1.55;transition:background .15s;
    }
    .radio-label:hover{background:#f9fafb;}
    .radio-label input[type="radio"]{margin-top:3px;flex-shrink:0;accent-color:#2563eb;}

    .submit-btn{
      width:100%;padding:14px;background:#059669;color:#fff;border:none;
      border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;
      font-family:inherit;margin-bottom:14px;transition:background .2s;
    }
    .submit-btn:hover{background:#047857;}
    .submit-btn:disabled{background:#9ca3af;cursor:not-allowed;}

    .sub-result{
      padding:16px;border-radius:10px;text-align:center;
      margin-bottom:16px;font-size:14px;line-height:1.8;
    }
    .sub-result.ok{background:#ecfdf5;border:1px solid #6ee7b7;color:#065f46;}
    .sub-result.warn{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;}

    /* ===== 送信モード 解説・最終画面 ===== */
    .sm-explanation{
      display:flex;gap:10px;align-items:flex-start;
      background:#fffbeb;border:1px solid #fcd34d;
      border-radius:8px;padding:12px 14px;
      font-size:13px;line-height:1.7;color:#78350f;
      margin-bottom:12px;
    }
    .sm-expl-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
    .sm-final-card{
      background:#fff;border-radius:16px;padding:36px 24px;
      text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1);
    }
    .sm-final-icon{font-size:52px;margin-bottom:12px;}
    .sm-final-title{font-size:17px;font-weight:700;color:#1a202c;margin-bottom:6px;}
    .sm-final-name{font-size:15px;color:#2563eb;font-weight:600;margin-bottom:20px;}
    .sm-start-btn{
      width:100%;padding:13px;background:#2563eb;color:#fff;border:none;
      border-radius:8px;font-size:15px;font-weight:600;
      cursor:pointer;font-family:inherit;margin-bottom:0;
      transition:background .2s;
    }
    .sm-start-btn:hover{background:#1e3a8a;}

    /* ===== 準備中 ===== */
    .coming-card{
      background:#fff;border-radius:16px;padding:50px 24px;
      text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08);color:#6b7280;
    }
    .coming-icon{font-size:48px;margin-bottom:14px;}
    .coming-title{font-size:18px;font-weight:600;color:#374151;margin-bottom:8px;}
    .coming-text{font-size:14px;}

    /* ===== 学習順/ランダム切替 ===== */
    .order-row{
      display:flex;align-items:center;gap:6px;margin-bottom:10px;
    }
    .order-label{font-size:12px;color:#64748b;margin-right:2px;white-space:nowrap;}
    .order-btn{
      padding:5px 14px;border-radius:20px;border:1.5px solid #cbd5e1;
      background:#fff;color:#64748b;font-size:12px;font-weight:600;
      cursor:pointer;font-family:inherit;transition:all .2s;
    }
    .order-btn.active{background:#2563eb;border-color:#2563eb;color:#fff;}
    .order-btn:hover:not(.active){background:#f1f5f9;border-color:#93c5fd;}

    /* KaTeX調整 */
    .katex{font-size:1em;}
    .katex-display{margin:.3em 0;}
  
/* ===== キルヒホッフ演習（スコープ化） ===== */
#kirchhoff-root{
    --paper:#F5F3EC;--card:#FFFFFF;--ink:#16243B;--ink-soft:#52617A;
    --line:#D6D0C2;--accent:#E07A1F;--accent-soft:#FBE8D4;
    --ok:#2E7D5B;--ok-soft:#E4F1EA;--no:#C0392B;--no-soft:#FBE7E3;
    --mono:"SFMono-Regular",ui-monospace,"Roboto Mono","Consolas",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;
  }#kirchhoff-root *{box-sizing:border-box}#kirchhoff-root, #kirchhoff-root{margin:0}#kirchhoff-root{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.7;-webkit-text-size-adjust:100%;padding:20px 14px}#kirchhoff-root .wrap{max-width:720px;margin:0 auto}#kirchhoff-root header.hero{margin:0 0 26px}#kirchhoff-root .eyebrow{font-family:var(--mono);font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}#kirchhoff-root h1{font-size:1.5rem;line-height:1.3;margin:0 0 6px;font-weight:700;letter-spacing:.01em}#kirchhoff-root .sub{color:var(--ink-soft);font-size:.95rem;margin:0}#kirchhoff-root .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 22px 24px;margin:0 0 20px}#kirchhoff-root .card>h2{font-size:1.02rem;margin:0 0 14px;font-weight:700;display:flex;align-items:baseline;gap:10px}#kirchhoff-root .card>h2 .no{font-family:var(--mono);font-size:.78rem;letter-spacing:.12em;color:#fff;background:var(--ink);border-radius:6px;padding:3px 8px;white-space:nowrap}#kirchhoff-root .schematic{width:100%;height:auto;display:block;margin:0 auto 10px;max-width:480px}#kirchhoff-root .wire{stroke:var(--ink);stroke-width:2.4;fill:none;stroke-linecap:round}#kirchhoff-root .comp{stroke:var(--ink);stroke-width:2.4;fill:var(--card)}#kirchhoff-root .batt{stroke:var(--ink);stroke-linecap:round}#kirchhoff-root .node{fill:var(--ink)}#kirchhoff-root .lab{fill:var(--ink);font-family:var(--mono);font-size:14px}#kirchhoff-root .lab-val{fill:var(--ink-soft);font-family:var(--mono);font-size:12.5px}#kirchhoff-root .cur{fill:var(--accent);font-family:var(--mono);font-size:15px;font-weight:600}#kirchhoff-root .arrow{stroke:var(--accent);stroke-width:2.6;fill:none;stroke-linecap:round;stroke-linejoin:round}#kirchhoff-root .arrowhead{fill:var(--accent)}#kirchhoff-root .nodelab{fill:var(--ink);font-family:var(--sans);font-size:14px;font-weight:700}#kirchhoff-root .dot{fill:var(--accent)}
  @keyframes flowUp{from{transform:translateY(0)}to{transform:translateY(-232px)}}
  @keyframes flowDn{from{transform:translateY(0)}to{transform:translateY(232px)}}
  @keyframes flowRt{from{transform:translateX(0)}to{transform:translateX(166px)}}
  @keyframes flowLt{from{transform:translateX(0)}to{transform:translateX(-166px)}}#kirchhoff-root .up{animation:flowUp 2.4s linear infinite}#kirchhoff-root .dn{animation:flowDn 2.4s linear infinite}#kirchhoff-root .rt{animation:flowRt 2.4s linear infinite}#kirchhoff-root .lt{animation:flowLt 2.4s linear infinite}
  @keyframes aPulse{0%{opacity:.45;transform:scale(.6)}70%{opacity:0;transform:scale(2.4)}100%{opacity:0;transform:scale(2.4)}}#kirchhoff-root .aPulse{fill:var(--accent);transform-box:fill-box;transform-origin:center;animation:aPulse 2.4s ease-out infinite}#kirchhoff-root .d2{animation-delay:.8s}#kirchhoff-root .d3{animation-delay:1.6s}
  @media (prefers-reduced-motion:reduce){#kirchhoff-root .dot{animation:none;opacity:0}#kirchhoff-root .aPulse{animation:none;opacity:0}}#kirchhoff-root .note{font-size:.8rem;color:var(--ink-soft);text-align:center;margin:0 0 14px;line-height:1.6}#kirchhoff-root .given{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;border-top:1px dashed var(--line);padding-top:16px;margin-top:4px}#kirchhoff-root .chip{font-family:var(--mono);font-size:.86rem;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:5px 11px;color:var(--ink)}#kirchhoff-root .chip b{color:var(--accent);font-weight:600}#kirchhoff-root .reroll{display:block;margin:16px auto 0;appearance:none;border:1.5px solid var(--ink);background:var(--card);color:var(--ink);font-family:var(--sans);font-weight:700;font-size:.86rem;border-radius:9px;padding:8px 16px;cursor:pointer;transition:background .12s ease,color .12s ease}#kirchhoff-root .reroll:hover{background:var(--ink);color:#fff}#kirchhoff-root .prompt{margin:0 0 16px;color:var(--ink)}#kirchhoff-root .prompt .eq{font-family:var(--mono);background:var(--paper);padding:1px 6px;border-radius:5px}#kirchhoff-root .choices{display:flex;flex-direction:column;gap:10px;margin:0 0 16px}#kirchhoff-root .choice{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;background:var(--card);transition:border-color .12s ease,background .12s ease}#kirchhoff-root .choice:hover{border-color:var(--accent)}#kirchhoff-root .choice input{position:absolute;opacity:0;width:0;height:0}#kirchhoff-root .tick{flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;transition:border-color .12s ease}#kirchhoff-root .choice:hover .tick{border-color:var(--accent)}#kirchhoff-root .choice.sel{border-color:var(--accent);background:var(--accent-soft)}#kirchhoff-root .choice.sel .tick{border-color:var(--accent)}#kirchhoff-root .choice.sel .tick::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--accent)}#kirchhoff-root .choice .txt{font-family:var(--mono);font-size:1rem;color:var(--ink);letter-spacing:.01em}#kirchhoff-root .choices.locked .choice{cursor:default;pointer-events:none}#kirchhoff-root .choice.correct{border-color:var(--ok);background:var(--ok-soft)}#kirchhoff-root .choice.correct .tick{border-color:var(--ok)}#kirchhoff-root .choice.correct .tick::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--ok)}#kirchhoff-root .choice.wrong{border-color:var(--no);background:var(--no-soft)}#kirchhoff-root .choice.wrong .tick{border-color:var(--no)}#kirchhoff-root .choice.wrong .tick::after{content:"\00d7";color:var(--no);font-size:15px;font-weight:700;line-height:1}#kirchhoff-root .tag{margin-left:auto;font-family:var(--mono);font-size:.72rem;letter-spacing:.06em;padding:2px 7px;border-radius:5px;white-space:nowrap}#kirchhoff-root .tag.ok{color:var(--ok);background:#fff;border:1px solid var(--ok)}#kirchhoff-root .tag.ng{color:var(--no);background:#fff;border:1px solid var(--no)}#kirchhoff-root .btn{appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-size:.95rem;font-weight:700;color:#fff;background:var(--ink);border-radius:10px;padding:11px 20px;transition:opacity .12s ease}#kirchhoff-root .btn:hover{opacity:.88}#kirchhoff-root .btn:disabled{background:var(--line);color:#fff;cursor:default;opacity:1}#kirchhoff-root .btn:focus-visible, #kirchhoff-root .choice:focus-within, #kirchhoff-root .reroll:focus-visible{outline:3px solid var(--accent);outline-offset:2px}#kirchhoff-root .feedback{display:none;margin-top:16px;border-radius:10px;padding:14px 16px;font-size:.93rem}#kirchhoff-root .feedback.show{display:block}#kirchhoff-root .feedback.right{background:var(--ok-soft);border:1px solid var(--ok)}#kirchhoff-root .feedback.right .head{color:var(--ok)}#kirchhoff-root .feedback.miss{background:var(--no-soft);border:1px solid var(--no)}#kirchhoff-root .feedback.miss .head{color:var(--no)}#kirchhoff-root .feedback .head{font-weight:700;margin:0 0 8px;display:flex;align-items:center;gap:7px}#kirchhoff-root .feedback p{margin:0 0 6px}#kirchhoff-root .feedback .rev{color:var(--accent);font-weight:700}#kirchhoff-root .feedback .work{font-family:var(--mono);font-size:.86rem;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-top:8px;line-height:1.85;white-space:pre-wrap;color:var(--ink)}#kirchhoff-root .score{text-align:center;background:var(--ink);color:#fff;border-color:var(--ink)}#kirchhoff-root .score h2{justify-content:center;color:#fff}#kirchhoff-root .score .big{font-family:var(--mono);font-size:2.4rem;font-weight:700;margin:6px 0 2px}#kirchhoff-root .score .big .accent{color:var(--accent)}#kirchhoff-root .score p{margin:2px 0 0;color:#cdd4df;font-size:.9rem}#kirchhoff-root .score .btn{background:var(--accent);margin-top:16px}#kirchhoff-root .foot{text-align:center;color:var(--ink-soft);font-size:.78rem;margin-top:8px}

</style>
</head>
<body>

<header>
  <div class="hdr-school">神奈川県立湘南高等学校　物理</div>
  <div class="hdr-title">⚡ 電流と抵抗 学習クイズ</div>
  <div class="hdr-sub" id="hdrSub"></div>
</header>

<div class="tabs" id="tabs"></div>

<div class="main">
  <div class="mode-row">
    <button class="mode-btn" id="modeStudy" onclick="setMode('study')">📖 自習モード</button>
    <button class="mode-btn" id="modeSubmit" onclick="setMode('submit')">📋 学習記録モード</button>
  </div>
  <div id="content"></div>
</div>

<script>
const SECTIONS = [
  {
    id: 1,
    label: "基本①",
    subtitle: "電流の定義・オームの法則・抵抗",
    available: true,
    questions: [
      {
        id: 1,
        text: "電流の記号として正しいものはどれか。",
        choices: ["I", "V", "R", "Q"]
      },
      {
        id: 2,
        text: "電流の単位として正しいものはどれか。",
        choices: ["A", "V", "\\(\\Omega\\)", "W"]
      },
      {
        id: 3,
        text: "電流の定義として正しいものはどれか。",
        choices: [
          "ある断面を単位時間に通過する電気量",
          "ある断面を単位時間に通過する仕事",
          "単位面積を通過する電気量",
          "単位体積中の自由電子の数"
        ]
      },
      {
        id: 4,
        text: "\\(\\Delta t\\) 秒の間に断面積 \\(S\\) の導体の断面を電気量 \\(Q\\,\\mathrm{[C]}\\) が通過したときの電流 \\(I\\) を表す式はどれか。",
        choices: [
          "\\(I = \\dfrac{Q}{\\Delta t}\\)",
          "\\(I = Q\\Delta t\\)",
          "\\(I = \\dfrac{\\Delta t}{Q}\\)",
          "\\(I = \\dfrac{Q}{S\\Delta t}\\)"
        ]
      },
      {
        id: 5,
        text: "電子の電気量 \\(e\\)、速さ \\(v\\)、単位体積あたりの電子の個数 \\(n\\)、導体の断面積 \\(S\\) であるときの電流の強さ \\(I\\) を表す式はどれか。",
        choices: [
          "\\(I = envS\\)",
          "\\(I = \\dfrac{env}{S}\\)",
          "\\(I = \\dfrac{enS}{v}\\)",
          "\\(I = enS\\)"
        ]
      },
      {
        id: 6,
        text: "電圧 \\(V\\) を長さ \\(L\\)、断面積 \\(S\\) の導体に加えたところ、導体には一定の大きさの電流が流れた。このとき、導体内の電子は一定の速さ \\(v\\) で運動していたと考える。導体内にできている一様電場 \\(E\\) の大きさを、\\(V\\)、\\(L\\) を用いて表す式はどれか。",
        choices: [

  31: "電力とは単位時間（1秒間）あたりに消費される電力量（エネルギー）のこと。\\(P=\\dfrac{Q}{t}\\) の関係にある。",
  32: "電力の記号は \\(P\\)（Power の頭文字）。電圧 \\(V\\)、電流 \\(I\\)、抵抗 \\(R\\) と区別する。",
  33: "電力の単位はワット [W]（Watt）。\\(1\\,\\mathrm{W}=1\\,\\mathrm{J/s}\\)、つまり1秒間に1Jのエネルギーを消費・発生する割合。",
  34: "力学における「仕事率」は単位時間あたりの仕事（エネルギー）であり、電力も単位時間あたりの電力量（エネルギー）なので、両者は物理的に同じ量である。",
  35: "\\(Q=VIt\\) を時間 \\(t\\) で割ると電力 \\(P=\\dfrac{Q}{t}=VI\\) が得られる。電力＝電圧×電流。",
  36: "\\(P=VI\\) にオームの法則 \\(I=\\dfrac{V}{R}\\) を代入すると \\(P=V\\times\\dfrac{V}{R}=\\dfrac{V^2}{R}\\)。",
  37: "\\(P=VI\\) にオームの法則 \\(V=RI\\) を代入すると \\(P=RI\\times I=RI^2\\)。",
  38: "ジュールの法則：抵抗で単位時間に発生する熱（電力）は \\(P=RI^2\\) で表され、抵抗値と電流の2乗に比例する。",
  39: "\\(1\\,\\mathrm{W}=1\\,\\mathrm{J/s}\\)。電力＝単位時間あたりのエネルギーなので、単位はエネルギー[J]を時間[s]で割った形になる。",
  40: "電力は単位時間あたりのエネルギー（瞬間的な消費の割合）であり、電力量は電力×時間で表される総エネルギー量。両者は次元（単位）も異なる別の物理量である。",
  41: "電力量＝電力×時間。電力の単位W、時間の単位hを組み合わせた単位がワット時 [Wh]。",
  42: "\\(1\\,\\mathrm{Wh}=1\\,\\mathrm{W}\\times1\\,\\mathrm{h}=1\\,\\mathrm{W}\\times3600\\,\\mathrm{s}=3600\\,\\mathrm{J}\\)。",
  43: "分流器：電流計と並列に接続することで、電流計に流れる電流を減らし、より大きな電流を測定できるようにする抵抗器。",
  44: "倍率器：電圧計と直列に接続することで、電圧計にかかる電圧を減らし、より大きな電圧を測定できるようにする抵抗器。",
  45: "分流器は電流計と並列に接続する。これにより測定したい電流の一部を分流器に流し、電流計には小さな電流のみを流す。",
  46: "倍率器は電圧計と直列に接続する。これにより測定したい電圧の一部を倍率器にかけ、電圧計には小さな電圧のみをかける。"
};

// ============================================================
// 状態管理
// ============================================================
let curSec   = 1;
let curMode  = 'study';
let orderMode = 'seq';

const ss = { secId:null, qs:[], idx:0, answered:false, correct:0, wrong:0, chosen:[] };
const sm = { secId:null, num:'', name:'', started:false, idx:0, answered:false, answers:{}, chosen:[] };
const km = { num:'', name:'', started:false };

// ============================================================
// ユーティリティ
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function doMath(el) {
  if (window.renderMathInElement) {
    renderMathInElement(el, {
      delimiters: [
        {left:'\\(',right:'\\)',display:false},
        {left:'\\[',right:'\\]',display:true}
      ],
      throwOnError: false
    });
  }
}

// ============================================================
// タブ・モード
// ============================================================
function buildTabs() {
  document.getElementById('tabs').innerHTML = SECTIONS.map(s => `
    <div class="tab ${s.id===curSec?'active':''} ${!s.available?'disabled':''}"
         onclick="${s.available?`setSec(${s.id})`:''}">
      ${s.label}
    </div>
  `).join('');
}
function setSec(id) {
  curSec = id;
  ss.secId = null;
  sm.started = false;
  km.started = false;
  buildTabs();
  render();
}
function setMode(mode) {
  curMode = mode;
  document.getElementById('modeStudy' ).classList.toggle('active', mode==='study' );
  document.getElementById('modeSubmit').classList.toggle('active', mode==='submit');
  render();
}


// ============================================================
// 基本③ キルヒホッフ（自習 / 学習記録）
// ============================================================
function mountKirchhoff(onFinish) {
  document.getElementById('content').insertAdjacentHTML('beforeend',
    '<div id="kirchhoff-root">' + (window._kirchhoffBodyHtml || '') + '</div>');
  window._kirchhoffOnFinish = onFinish || null;
  if (window._kirchhoffInit) {
    try { window._kirchhoffInit(); }
    catch(e){ console.error('kirchhoff init error:', e); }
  }
}

function renderKirchhoffStudy(sec) {
  document.getElementById('content').innerHTML =
    '<p style="font-size:12px;color:#64748b;text-align:center;margin-bottom:10px;">' +
    '自習モードです。数値はランダムに出題されます。</p>';
  mountKirchhoff(null);
}

function renderKirchhoffSubmit(sec) {
  if (!km.started) {
    document.getElementById('content').innerHTML = `
      <div class="name-card">
        <label class="name-label" for="ksnum">組番号を入力してください</label>
        <input type="text" class="name-input" id="ksnum"
               placeholder="例：C01～E40" value="${km.num}">
      </div>
      <div class="name-card">
        <label class="name-label" for="ksname">氏名を入力してください</label>
        <input type="text" class="name-input" id="ksname"
               placeholder="例：湘南 太郎" value="${km.name}">
      </div>
      <button class="sm-start-btn" onclick="startKirchhoffSubmit()">
        ✏️ 演習を開始する（全 5 問）
      </button>`;
    return;
  }
  // 演習表示（完了時に送信）
  document.getElementById('content').innerHTML =
    '<p style="font-size:12px;color:#64748b;text-align:center;margin-bottom:10px;">' +
    '<strong>' + km.num + '　' + km.name + '</strong> さん／全5問に解答すると自動で送信されます。</p>' +
    '<div id="ksresult"></div>';
  mountKirchhoff(function(score, results){
    submitKirchhoff(score, results);
  });
}

function startKirchhoffSubmit() {
  const num  = document.getElementById('ksnum').value.trim();
  const name = document.getElementById('ksname').value.trim();
  if (!num)  { alert('組番号を入力してください。'); return; }
  if (!name) { alert('氏名を入力してください。');   return; }
  km.num = num; km.name = name; km.started = true;
  renderKirchhoffSubmit(SECTIONS.find(s => s.kirchhoff));
}

function submitKirchhoff(score, results) {
  const sec = SECTIONS.find(s => s.kirchhoff);
  const params = new URLSearchParams({
    num: km.num, name: km.name, section: sec.label,
    correct: String(score), total: '5',
    timestamp: new Date().toLocaleString('ja-JP')
  });
  // 5問の正誤（○/×）。問題番号は47〜51を割り当て
  results.forEach((r, i) => { params.append('q' + (47 + i), r ? '○' : '×'); });

  const box = document.getElementById('ksresult');
  if (box) box.innerHTML =
    '<div class="sub-result warn">📤 送信中…</div>';

  trySendKirchhoff(params, score, 1);
}

async function trySendKirchhoff(params, score, attempt) {
  const MAX_RETRY = 3;
  const box = document.getElementById('ksresult');
  try {
    if (box) box.innerHTML =
      '<div class="sub-result warn">' +
      (attempt === 1 ? '📤 送信中…' : '🔄 再送信中… (' + attempt + '/' + MAX_RETRY + ')') +
      '</div>';
    await fetch(`${GAS_URL}?${params}`, { method: 'GET', mode: 'no-cors' });
    if (box) box.innerHTML = `
      <div class="sub-result ok">
        ✅ 送信完了しました。お疲れ様でした！<br>
        <strong>${km.num}　${km.name}</strong> さんの得点：<strong>${score} / 5</strong>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
        <button class="next-btn" onclick="km.started=false; setMode('study')">📖 自習モードで学習する</button>
        <button class="next-btn" style="background:#059669;"
                onclick="km.started=false; setMode('submit')">📋 学習記録モードでもう一度</button>
      </div>`;
  } catch(e) {
    if (attempt < MAX_RETRY) {
      await new Promise(r => setTimeout(r, 2000));
      await trySendKirchhoff(params, score, attempt + 1);
    } else {
      if (box) box.innerHTML = `
        <div class="sub-result warn">
          ❌ 送信に失敗しました。ネットワークを確認してもう一度お試しください。<br>
          <strong>${km.num}　${km.name}</strong> さんの得点：<strong>${score} / 5</strong>
        </div>
        <button class="next-btn" style="margin-top:10px;"
                onclick="km.started=false; setMode('submit')">📋 もう一度</button>`;
    }
  }
}

// ============================================================
// メインレンダー
// ============================================================
function render() {
  const sec = SECTIONS.find(s => s.id === curSec);
  document.getElementById('hdrSub').textContent = sec.subtitle || '';

  if (!sec.available) {
    document.getElementById('content').innerHTML = `
      <div class="coming-card">
        <div class="coming-icon">🔧</div>
        <div class="coming-title">準備中</div>
        <div class="coming-text">${sec.label} は現在準備中です。</div>
      </div>`;
    return;
  }

  if (sec.kirchhoff) {
    if (curMode === 'submit') renderKirchhoffSubmit(sec);
    else                       renderKirchhoffStudy(sec);
    return;
  }

  if (curMode === 'study') renderStudy(sec);
  else                      renderSubmit(sec);
}

// ============================================================
// 自習モード
// ============================================================
function setOrderMode(mode) {
  orderMode = mode;
  ss.secId = null;
  ss.chosen = [];
  render();
}
function startStudy(sec) {
  ss.secId = sec.id;
  ss.qs = orderMode==='rand' ? shuffle(sec.questions) : [...sec.questions];
  ss.idx = 0; ss.answered = false; ss.correct = 0; ss.wrong = 0; ss.chosen = [];
  renderStudy(sec);
}
function renderStudy(sec) {
  if (ss.secId !== sec.id || ss.qs.length === 0) { startStudy(sec); return; }
  if (ss.idx >= ss.qs.length) { renderResult(sec); return; }
  const q = ss.qs[ss.idx];
  const total = ss.qs.length;
  const pct = Math.round((ss.idx/total)*100);
  if (ss.chosen.length === 0) ss.chosen = shuffle(q.choices.map((_,i)=>i));
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="order-row">
      <span class="order-label">出題順：</span>
      <button class="order-btn ${orderMode==='seq'?'active':''}" onclick="setOrderMode('seq')">学習順</button>
      <button class="order-btn ${orderMode==='rand'?'active':''}" onclick="setOrderMode('rand')">ランダム</button>
    </div>
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-text">${ss.idx+1} / ${total}</div>
    </div>
    <div class="score-row" id="scoreRow">✅ ${ss.correct} &nbsp;❌ ${ss.wrong}</div>
    <div class="q-card">
      <div class="q-num">問 ${q.id}</div>
      ${q.image?`<img class="q-img" src="${q.image}" alt="図${q.id}">`:''}
      <div class="q-text">${q.text}</div>
    </div>
    <div class="choices" id="clist">
      ${ss.chosen.map((ci,pos)=>`
        <button class="choice-btn" id="cb${pos}" onclick="pick(${pos})"
                ${ss.answered?'disabled':''}>
          ${q.choices[ci]}
        </button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nb" onclick="nextQ()" style="display:none;">
      ${ss.idx+1<total?'次の問題 →':'結果を見る →'}
    </button>`;
  doMath(el);
}
function pick(pos) {
  if (ss.answered) return;
  ss.answered = true;
  const q = ss.qs[ss.idx];
  const isCorrect = ss.chosen[pos] === 0;
  if (isCorrect) ss.correct++; else ss.wrong++;
  ss.chosen.forEach((ci,p)=>{
    const btn = document.getElementById(`cb${p}`);
    if (!btn) return;
    btn.disabled = true;
    if (ci===0) btn.classList.add('correct');
    else if (p===pos) btn.classList.add('wrong');
  });
  const fb = document.getElementById('fb');
  const expl = EXPLANATIONS[q.id] || '';
  if (isCorrect) {
    fb.className = 'feedback ok';
    fb.innerHTML = `✅ 正解です！${expl?`<br><span class="fb-expl">💡 ${expl}</span>`:''}`;
  } else {
    fb.className = 'feedback ng';
    fb.innerHTML = `❌ 不正解。正解は「${q.choices[0]}」です。${expl?`<br><span class="fb-expl">💡 ${expl}</span>`:''}`;
  }
  doMath(fb);
  document.getElementById('scoreRow').innerHTML = `✅ ${ss.correct} &nbsp;❌ ${ss.wrong}`;
  document.getElementById('nb').style.display = 'block';
}
function nextQ() {
  ss.idx++; ss.answered = false; ss.chosen = [];
  renderStudy(SECTIONS.find(s=>s.id===curSec));
}
function renderResult(sec) {
  const total = ss.qs.length, c = ss.correct;
  const pct = Math.round((c/total)*100);
  const emoji = pct>=90?'🎉':pct>=70?'👍':pct>=50?'🤔':'😢';
  document.getElementById('content').innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${emoji}</div>
      <div class="result-score">${c}</div>
      <div class="result-total">/ ${total} 問正解</div>
      <div class="result-pct">正答率 ${pct}%</div>
      <button class="retry-btn" onclick="startStudy(SECTIONS.find(s=>s.id===${curSec}))">
        🔄 もう一度やり直す
      </button>
    </div>`;
}

// ============================================================
// 学習記録モード
// ============================================================
function renderSubmit(sec) {
  if (sm.secId !== sec.id || !sm.started) { renderSubmitIntro(sec); return; }
  if (sm.idx >= sec.questions.length) { renderSubmitFinal(sec); return; }
  renderSubmitQuestion(sec);
}
function renderSubmitIntro(sec) {
  document.getElementById('content').innerHTML = `
    <div class="name-card">
      <label class="name-label" for="snum">組番号を入力してください</label>
      <input type="text" class="name-input" id="snum"
             placeholder="例：C01～E40"
             value="${sm.secId===sec.id?sm.num:''}">
    </div>
    <div class="name-card">
      <label class="name-label" for="sname">氏名を入力してください</label>
      <input type="text" class="name-input" id="sname"
             placeholder="例：湘南 太郎"
             value="${sm.secId===sec.id?sm.name:''}">
    </div>
    <button class="sm-start-btn" onclick="startSubmitQuiz(${sec.id})">
      ✏️ 回答を開始する（全 ${sec.questions.length} 問）
    </button>`;
}
function startSubmitQuiz(secId) {
  const num  = document.getElementById('snum').value.trim();
  const name = document.getElementById('sname').value.trim();
  if (!num)  { alert('組番号を入力してください。'); return; }
  if (!name) { alert('氏名を入力してください。');   return; }
  sm.secId=secId; sm.num=num; sm.name=name; sm.started=true;
  sm.idx=0; sm.answered=false; sm.answers={}; sm.chosen=[];
  renderSubmit(SECTIONS.find(s=>s.id===secId));
}
function renderSubmitQuestion(sec) {
  const q = sec.questions[sm.idx];
  const total = sec.questions.length;
  const pct = Math.round((sm.idx/total)*100);
  if (sm.chosen.length===0) sm.chosen = shuffle(q.choices.map((_,i)=>i));
  const expl = EXPLANATIONS[q.id] || '';
  const selectedCi = sm.answers[q.id];
  const el = document.getElementById('content');
  el.innerHTML = `
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-text">${sm.idx+1} / ${total}</div>
    </div>
    <div class="q-card">
      <div class="q-num">問 ${q.id}</div>
      ${q.image?`<img class="q-img" src="${q.image}" alt="図${q.id}">`:''}
      <div class="q-text">${q.text}</div>
    </div>
    <div class="choices">
      ${sm.chosen.map((ci,pos)=>{
        let cls='';
        if(sm.answered){
          if(ci===0) cls='correct';
          else if(ci===selectedCi&&ci!==0) cls='wrong';
        }
        return `<button class="choice-btn ${cls}" id="smcb${pos}"
                  onclick="pickSubmit(${pos})"
                  ${sm.answered?'disabled':''}>
          ${q.choices[ci]}
        </button>`;
      }).join('')}
    </div>
    ${sm.answered?`
      <div class="sm-explanation">
        <span class="sm-expl-icon">💡</span>
        <span>${expl}</span>
      </div>
      <button class="next-btn" onclick="nextSubmitQ()">
        ${sm.idx+1<total?'次の問題 →':'✅ 送信画面へ →'}
      </button>
    `:''}`;
  doMath(el);
}
function pickSubmit(pos) {
  if (sm.answered) return;
  sm.answered = true;
  const sec = SECTIONS.find(s=>s.id===sm.secId);
  const q = sec.questions[sm.idx];
  sm.answers[q.id] = sm.chosen[pos];
  renderSubmitQuestion(sec);
}
function nextSubmitQ() {
  sm.idx++; sm.answered=false; sm.chosen=[];
  renderSubmit(SECTIONS.find(s=>s.id===sm.secId));
}
function renderSubmitFinal(sec) {
  document.getElementById('content').innerHTML = `
    <div class="sm-final-card">
      <div class="sm-final-icon">📝</div>
      <div class="sm-final-title">全 ${sec.questions.length} 問の回答が完了しました</div>
      <div class="sm-final-name">${sm.name} さん</div>
      <button class="submit-btn" id="sbtn" onclick="doSubmit(${sec.id})">
        📤 回答を送信する
      </button>
      <div id="sresult"></div>
    </div>`;
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyCP6bSJ7BzOEG0vWzTmpEYUM9hmU4mL7JPSXNl6oemUU4rSvNFzFWHS4TxtWGOKQUT/exec';
let _gasParams = null, _gasMeta = null;

function doSubmit(secId) {
  const sec = SECTIONS.find(s=>s.id===secId);
  let correct = 0;
  sec.questions.forEach(q=>{ if(sm.answers[q.id]===0) correct++; });
  _gasMeta = {num:sm.num, name:sm.name, correct, total:sec.questions.length};
  _gasParams = new URLSearchParams({
    num:sm.num, name:sm.name, section:sec.label,
    correct:String(correct), total:String(sec.questions.length),
    timestamp: new Date().toLocaleString('ja-JP')
  });
  sec.questions.forEach(q=>{ _gasParams.append('q'+q.id, sm.answers[q.id]===0?'○':'×'); });
  const btn = document.getElementById('sbtn');
  btn.disabled = true; btn.textContent = '📤 送信中…';
  trySend(btn, 1);
}
async function trySend(btn, attempt) {
  const MAX_RETRY = 3;
  try {
    if(btn) btn.textContent = attempt===1?'📤 送信中…':`🔄 再送信中… (${attempt}/${MAX_RETRY})`;
    await fetch(`${GAS_URL}?${_gasParams}`, {method:'GET', mode:'no-cors'});
    const {num, name, correct, total} = _gasMeta;
    document.getElementById('sresult').innerHTML = `
      <div class="sub-result ok">
        ✅ 送信完了しました。お疲れ様でした！<br>
        <strong>${num}　${name}</strong> さんの得点：<strong>${correct} / ${total}</strong>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">
        <button class="next-btn" onclick="setMode('study')">📖 自習モードで学習する</button>
        <button class="next-btn" style="background:#059669;"
                onclick="sm.started=false; setMode('submit')">📋 学習記録モードでもう一度</button>
      </div>`;
  } catch(e) {
    if (attempt < MAX_RETRY) {
      await new Promise(r=>setTimeout(r,2000));
      await trySend(btn, attempt+1);
    } else {
      const {num, name, correct, total} = _gasMeta;
      document.getElementById('sresult').innerHTML = `
        <div class="sub-result warn">
          ❌ 送信に失敗しました。ネットワークを確認してもう一度お試しください。<br>
          <strong>${num}　${name}</strong> さんの得点：<strong>${correct} / ${total}</strong>
        </div>`;
      if(btn){ btn.disabled=false; btn.textContent='📤 もう一度送信する'; }
    }
  }
}

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', ()=>{
  buildTabs();
  document.getElementById('modeStudy').classList.add('active');
  render();
});

        if(state.done[key])return;
        Array.prototype.forEach.call(listEl.children,function(x){x.classList.remove("sel");});
        lab.classList.add("sel"); lab.querySelector("input").checked=true;
        picked=lab; btnEl.disabled=false;
      }
      lab.addEventListener("click",choose);
      lab.addEventListener("keydown",function(e){if(e.key===" "||e.key==="Enter"){e.preventDefault();choose();}});
      listEl.appendChild(lab);
    });
    btnEl.onclick=function(){
      if(!picked||state.done[key])return;
      state.done[key]=true; listEl.classList.add("locked"); btnEl.disabled=true;
      var isRight=!!picked._correct; state.correct[key]=isRight;
      Array.prototype.forEach.call(listEl.children,function(x){
        if(x._correct){x.classList.add("correct");var t=document.createElement("span");t.className="tag ok";t.textContent="正解";x.appendChild(t);}
        if(x===picked&&!isRight){x.classList.add("wrong");var t=document.createElement("span");t.className="tag ng";t.textContent="あなたの解答";x.appendChild(t);}
      });
      fbEl.className="feedback show "+(isRight?"right":"miss");
      fbEl.innerHTML='<p class="head">'+(isRight?"✓ ":"→ ")+(isRight?spec.headOk:spec.headNg)+'</p>'+
                     '<p>'+(isRight?spec.bodyOk:spec.bodyNg)+'</p>'+
                     (spec.note?'<p class="rev">'+spec.note+'</p>':'')+
                     '<div class="work">'+spec.work+'</div>';
      maybeFinish();
    };
  }

  function maybeFinish(){
    var allDone=KEYS.every(function(k){return state.done[k];});
    if(!allDone)return;
    var n=KEYS.reduce(function(s,k){return s+(state.correct[k]?1:0);},0);
    $("sc").textContent=n;
    $("scmsg").textContent = n===5?"全問正解。第一法則・第二法則ともに完璧です。"
      : n>=3?"よくできました。間違えた問題の解説を確認しましょう。"
      : "解説を読んで、式の立て方から見直しましょう。";
    var r=$("result"); r.style.display=""; r.scrollIntoView({behavior:"smooth",block:"center"});
    // 学習記録モード用：5問の正誤を外部に通知
    if (window._kirchhoffOnFinish) {
      var results = KEYS.map(function(k){ return state.correct[k] ? 1 : 0; });
      window._kirchhoffOnFinish(n, results);
    }
  }

  function newProblem(){
    P=generate(); paintCircuit(P);
    state={done:{},correct:{}};
    $("result").style.display="none";
    var note=revNote(P);

    buildQ({choices:choicesLoopLeft(P),
      headOk:"正解",headNg:"おしい",
      bodyOk:"左ループを電流の向きにたどると、R₁ も R₃ も電流の向きと進む向きが一致するので電圧降下は加算。起電力 V₁ がその和に等しくなります。",
      bodyNg:"符号と、ループに含まれる抵抗を確認しましょう。左ループは R₁・R₃ を通り、どちらも電圧降下は加算です。",
      note:"", work:workLeft(P)}, "q1");

    buildQ({choices:choicesLoopRight(P),
      headOk:"正解",headNg:"おしい",
      bodyOk:"右ループも同様に、R₂ と R₃ の電圧降下の和が起電力 V₂ に等しくなります。",
      bodyNg:"右ループが通るのは R₂ と R₃ です（R₁ は含みません）。どちらの電圧降下も加算になります。",
      note:"", work:workRight(P)}, "q2");

    buildQ({choices:choicesLoopOuter(P),
      headOk:"正解",headNg:"おしい",
      bodyOk:"外ループは中央の R₃ を通りません。左ループの式から右ループの式を引くと、R₃I₃ が消えて V₁ − V₂ = R₁I₁ − R₂I₂ が得られます。",
      bodyNg:"外ループは R₃ を通らないので R₃ の項は入りません。右の枝は電流 I₂ と逆向きにたどるため、符号は V₁ − V₂ = R₁I₁ − R₂I₂ となります。",
      note:"", work:workOuter(P)}, "q3");

    buildQ({choices:choicesNode(),
      headOk:"正解",headNg:"もう一度",
      bodyOk:"節点Aでは「流れ込む電流の和 = 流れ出る電流の和」。I₁ と I₂ が流れ込み、I₃ が流れ出るので I₁ + I₂ = I₃ です。",
      bodyNg:"節点Aに流れ込むのは I₁ と I₂、流れ出るのは I₃ です。流れ込む和と流れ出る和が等しいので I₁ + I₂ = I₃。",
      note:"", work:workNode()}, "q4");

    buildQ({choices:choicesCurrents(P),
      headOk:"正解",headNg:"もう一度",
      bodyOk:"第二法則の2式（左・右）と第一法則を連立し、I₃ を消去して解きます。",
      bodyNg:"I₁+I₂=I₃ を満たすだけでは不十分です。左右ループの2式も同時に満たす組を選びます。",
      note:note, work:workCurrents(P)}, "q5");
  }

  $("reroll").addEventListener("click",function(){newProblem();$("q1").scrollIntoView({behavior:"smooth",block:"start"});});
  $("retry").addEventListener("click",function(){newProblem();$("q1").scrollIntoView({behavior:"smooth",block:"start"});});
  newProblem();
})();

};
</script>
